<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コヒーレント呼吸 — 海辺 / 汽笛</title>
<style>
  :root{
    --bg:#0b1622;--bg2:#0f2130;--ink:#eef4f7;--ink-dim:#9fb2bd;
    --inhale:#7fd6c8;--exhale:#f2c79a;
    --font-jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-jp);background:radial-gradient(120% 90% at 50% 12%, #16374a 0%, var(--bg2) 42%, var(--bg) 100%);color:var(--ink);min-height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
  canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .frame{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .masthead{position:fixed;top:clamp(20px,5vh,44px);left:0;right:0;text-align:center}
  .method{font-size:clamp(.82rem,2.4vw,1rem);font-weight:400;letter-spacing:.42em;text-indent:.42em;color:var(--ink)}
  .method .num{color:var(--ink-dim);font-weight:300;margin-right:.9em;letter-spacing:.2em}
  .romaji{margin-top:.7em;font-size:.62rem;letter-spacing:.5em;text-indent:.5em;color:var(--ink-dim);text-transform:uppercase}
  .word{display:flex;gap:.06em;font-weight:300;font-size:clamp(3.4rem,15vw,7rem);letter-spacing:.14em;line-height:1;color:var(--ink);transition:color 1.4s ease}
  .word.inhale{color:var(--inhale)}.word.exhale{color:var(--exhale)}
  .word span{display:inline-block;opacity:0;transform:translateY(.18em);transition:opacity 1.1s cubic-bezier(.25,.6,.3,1),transform 1.1s cubic-bezier(.25,.6,.3,1);text-indent:.14em}
  .word span.on{opacity:1;transform:translateY(0)}
  .subtext{position:fixed;bottom:clamp(74px,15vh,120px);left:0;right:0;text-align:center;font-size:.72rem;letter-spacing:.4em;text-indent:.4em;color:var(--ink-dim);min-height:1em;transition:opacity 1.2s ease}
  .controls{position:fixed;bottom:clamp(16px,4vh,30px);left:50%;transform:translateX(-50%);z-index:2;display:flex;gap:16px;align-items:center;pointer-events:auto}
  button{font-family:var(--font-jp);cursor:pointer;border:1px solid rgba(159,178,189,.35);background:rgba(15,33,48,.5);backdrop-filter:blur(6px);color:var(--ink);padding:12px 30px;border-radius:999px;font-size:.9rem;letter-spacing:.22em;text-indent:.22em;transition:all .3s ease}
  button:hover{border-color:var(--inhale);color:#fff}
  button:focus-visible{outline:2px solid var(--inhale);outline-offset:3px}
  .vol{display:flex;align-items:center;gap:9px;color:var(--ink-dim);font-size:.68rem;letter-spacing:.12em}
  input[type=range]{-webkit-appearance:none;appearance:none;width:80px;height:2px;border-radius:2px;background:rgba(159,178,189,.3);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--inhale);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;border-radius:50%;background:var(--inhale);cursor:pointer}
  .hint{position:fixed;top:50%;left:0;right:0;text-align:center;color:var(--ink-dim);font-size:.74rem;letter-spacing:.3em;text-indent:.3em;z-index:2;transition:opacity .8s ease}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="masthead">
    <div class="method"><span class="num">01</span>コヒーレント呼吸</div>
    <div class="romaji">coherent breathing &nbsp;·&nbsp; by the sea</div>
  </div>
  <div class="frame"><div class="word" id="word" aria-live="polite"></div></div>
  <div class="subtext" id="subtext">円に合わせて</div>
  <div class="hint" id="hint">円がふくらむと吸う、しぼむと吐く</div>
  <div class="controls">
    <button id="toggle">▶ はじめる</button>
    <div class="vol"><span>おと</span><input type="range" id="vol" min="0" max="100" value="70" aria-label="音量"></div>
  </div>

<script>
(() => {
  "use strict";
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  const wordEl=document.getElementById('word'), subEl=document.getElementById('subtext');
  const toggleBtn=document.getElementById('toggle'), volEl=document.getElementById('vol'), hintEl=document.getElementById('hint');
  const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const INHALE=5.5, EXHALE=5.5, CYCLE=INHALE+EXHALE;

  let audio=null,master=null,reverb=null,reverbGain=null,drone=null,droneGain=null;
  let playing=false,schedulerId=null,animId=null,startT=0,lastPhase=null,foghornTimer=null;
  let hornGlow=0, hornX=0.5;

  const CHORDS=[
    [146.83,220.00,277.18,329.63,415.30],
    [164.81,246.94,329.63,415.30,493.88],
    [130.81,196.00,261.63,329.63,392.00],
  ];

  function makeReverb(ac,dur,decay){const len=ac.sampleRate*dur,buf=ac.createBuffer(2,len,ac.sampleRate);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}const c=ac.createConvolver();c.buffer=buf;return c;}
  // ブラウンノイズ（海のざわめき用）
  let noiseBuf=null;
  function getNoise(ac){if(noiseBuf)return noiseBuf;const len=ac.sampleRate*3;noiseBuf=ac.createBuffer(1,len,ac.sampleRate);const d=noiseBuf.getChannelData(0);let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;}return noiseBuf;}

  function breathCurve(steps){const a=new Float32Array(steps);for(let i=0;i<steps;i++){const p=i/(steps-1);const bf=p<0.5?p/0.5:1-(p-0.5)/0.5;a[i]=(1-Math.cos(Math.PI*bf))/2;}return a;}
  const BREATH_STEPS=64, BREATH_ENV=breathCurve(BREATH_STEPS);

  function initAudio(){
    audio=new (window.AudioContext||window.webkitAudioContext)();
    master=audio.createGain(); master.gain.value=volEl.value/100*0.85; master.connect(audio.destination);
    reverb=makeReverb(audio,3.6,2.1); reverbGain=audio.createGain(); reverbGain.gain.value=0.6; reverb.connect(reverbGain); reverbGain.connect(master);
    drone=audio.createOscillator(); drone.type='sine'; drone.frequency.value=73.42;
    droneGain=audio.createGain(); droneGain.gain.value=0.0001;
    const dl=audio.createBiquadFilter(); dl.type='lowpass'; dl.frequency.value=400;
    drone.connect(droneGain); droneGain.connect(dl); dl.connect(master); drone.start();

    // ── 遠い海のざわめき（微か）──
    const sea=audio.createBufferSource(); sea.buffer=getNoise(audio); sea.loop=true;
    const seaLP=audio.createBiquadFilter(); seaLP.type='lowpass'; seaLP.frequency.value=440; seaLP.Q.value=0.4;
    const seaGain=audio.createGain(); seaGain.gain.value=0.018;
    sea.connect(seaLP); seaLP.connect(seaGain); seaGain.connect(master); seaGain.connect(reverb);
    const surf=audio.createOscillator(); surf.frequency.value=0.07; const surfG=audio.createGain(); surfG.gain.value=0.012;
    surf.connect(surfG); surfG.connect(seaGain.gain); surf.start(); sea.start();
  }

  // ── 汽笛：複数の船。船ごとに固有の音程と水平線上の位置。──
  // 鳴るたびに1隻が選ばれ、そのときの距離もランダム（遠め優勢）。
  // 音程は曲の調（D）に乗せた完全五度の積み：ドローンやパッドと共鳴して溶ける。
  const SHIPS=[
    {f0:73.42,  x:0.18},   // 大型船・D2（ドローンと同音）・左の沖
    {f0:110.00, x:0.55},   // 中型船・A2（五度上）・中央
    {f0:164.81, x:0.82},   // 小型船・E3（さらに五度上）・右
  ];
  function foghorn(t){
    const ship=SHIPS[Math.floor(Math.random()*SHIPS.length)];
    // 距離 0..1（0=いちばん近い / 1=水平線の彼方）。遠めに偏らせる
    const dist=Math.pow(Math.random(),0.45);
    const near=1-dist;

    hornGlow=0.25+near*0.75; hornX=ship.x+(Math.random()-0.5)*0.06;

    const dur=4.6+Math.random()*2.4;
    const f0=ship.f0;
    const bus=audio.createGain(); bus.gain.value=1;
    // 距離＝高い倍音の減衰（近い:1400Hzまで / 遠い:520Hzまで）
    const lp=audio.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value=520+near*880; lp.Q.value=0.6;
    // 音量：気配レベル（最遠 ~0.004、最近でも ~0.019）
    const peak=0.004+near*0.015;
    const level=audio.createGain();
    level.gain.setValueAtTime(0.0001,t);
    level.gain.exponentialRampToValueAtTime(peak,t+1.9+dist*1.2);  // 遠いほどゆっくり立ち上がる
    level.gain.setValueAtTime(peak,t+dur-2.4);
    level.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    bus.connect(lp); lp.connect(level); level.connect(master);
    // 残響：遠いほど残響が直接音に勝つ（近い1.1倍 / 遠い2.6倍）
    const rv=audio.createGain(); rv.gain.value=1.1+dist*1.5; lp.connect(rv); rv.connect(reverb);
    // 純正な整数倍音（うなりなし）＋ごく淡い五度上の声 → 濁らず、響きが増える
    const partials=[[1,1],[2,0.5],[3,0.3],[4,0.18],[5,0.1],[6,0.06]];
    const voices=[{r:1,a:1},{r:1.5,a:0.18}];
    voices.forEach(v=>partials.forEach(([mult,amp])=>{
      const o=audio.createOscillator(); o.type='sine'; o.frequency.value=f0*v.r*mult;
      const g=audio.createGain(); g.gain.value=amp*v.a*0.5; o.connect(g); g.connect(bus); o.start(t); o.stop(t+dur+0.2);
    }));
  }
  function scheduleFoghorn(){
    const wait=40+Math.random()*50;   // 40秒〜1分半に1回
    foghornTimer=setTimeout(()=>{ if(playing){ foghorn(audio.currentTime+0.1); scheduleFoghorn(); } }, wait*1000);
  }

  function scheduleCycle(t,idx){
    const chord=CHORDS[idx%CHORDS.length];
    const pg=audio.createGain(); pg.gain.value=0.0001;
    const env=new Float32Array(BREATH_STEPS); for(let i=0;i<BREATH_STEPS;i++) env[i]=0.0001+BREATH_ENV[i]*0.13;
    pg.gain.setValueCurveAtTime(env,t,CYCLE);
    const lp=audio.createBiquadFilter(); lp.type='lowpass';
    const fenv=new Float32Array(BREATH_STEPS); for(let i=0;i<BREATH_STEPS;i++) fenv[i]=500+BREATH_ENV[i]*1700;
    lp.frequency.setValueCurveAtTime(fenv,t,CYCLE);
    pg.connect(lp); lp.connect(master); lp.connect(reverb);
    chord.forEach((f,i)=>{const o=audio.createOscillator();o.type=i%2?'triangle':'sine';o.frequency.value=f;o.detune.value=(i-2)*3;const og=audio.createGain();og.gain.value=1/chord.length;o.connect(og);og.connect(pg);o.start(t);o.stop(t+CYCLE+0.4);});
    const denv=new Float32Array(BREATH_STEPS); for(let i=0;i<BREATH_STEPS;i++) denv[i]=0.02+BREATH_ENV[i]*0.05;
    droneGain.gain.setValueCurveAtTime(denv,t,CYCLE);
    bell(t+INHALE*0.96, chord[3]*2);
    const nb=1+Math.floor(Math.random()*3); for(let i=0;i<nb;i++) bubble(t+Math.random()*CYCLE);
  }
  function bell(t,f){const o=audio.createOscillator();o.type='sine';o.frequency.value=f;const g=audio.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.05,t+0.4);g.gain.exponentialRampToValueAtTime(0.0001,t+3.2);o.connect(g);g.connect(reverb);g.connect(master);o.start(t);o.stop(t+3.3);}
  function bubble(t){const o=audio.createOscillator();o.type='sine';const f=500+Math.random()*700;o.frequency.setValueAtTime(f*0.6,t);o.frequency.exponentialRampToValueAtTime(f,t+0.08);const g=audio.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.04,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);o.connect(g);g.connect(reverb);g.connect(master);o.start(t);o.stop(t+0.2);registerBubbleVisual(t);}

  let cycleIdx=0,nextCycleT=0;
  function scheduler(){while(nextCycleT<audio.currentTime+1.2){scheduleCycle(nextCycleT,cycleIdx);nextCycleT+=CYCLE;cycleIdx++;}schedulerId=setTimeout(scheduler,250);}

  function setWord(chars,cls){wordEl.className='word '+cls;wordEl.innerHTML='';const spans=chars.split('').map(c=>{const s=document.createElement('span');s.textContent=c;wordEl.appendChild(s);return s;});spans.forEach((s,i)=>setTimeout(()=>s.classList.add('on'),120+i*520));}

  let W=0,H=0,DPR=1;
  function resize(){DPR=Math.min(window.devicePixelRatio||1,2);const r=canvas.getBoundingClientRect();W=r.width;H=r.height;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
  window.addEventListener('resize',resize);

  const bubbleVis=[]; let pendingBubbles=[]; let ambientBubbleT=0;
  function registerBubbleVisual(t){pendingBubbles.push(t);}
  function spawnBubble(){bubbleVis.push({x:Math.random()*W,y:H+10,r:2+Math.random()*5,v:14+Math.random()*24,wob:Math.random()*Math.PI*2});}

  function currentBreath(now){const base=playing?now-startT:now;const p=(base%CYCLE+CYCLE)%CYCLE/CYCLE;const bf=p<0.5?p/0.5:1-(p-0.5)/0.5;return {b:(1-Math.cos(Math.PI*bf))/2,p,inhale:p<0.5};}

  function draw(){
    const now=audio?audio.currentTime:performance.now()/1000;
    const {b,inhale}=currentBreath(now);
    const phase=inhale?'in':'out';
    if(playing && phase!==lastPhase){lastPhase=phase;if(inhale){setWord('すう','inhale');subEl.textContent='鼻から、ゆっくり';}else{setWord('はく','exhale');subEl.textContent='口から、細く長く';}}

    while(pendingBubbles.length && now>=pendingBubbles[0]){pendingBubbles.shift();spawnBubble();}
    ambientBubbleT-=0.016; if(ambientBubbleT<=0 && !reduceMotion){if(Math.random()<0.4)spawnBubble();ambientBubbleT=0.6+Math.random();}
    hornGlow*=0.986;

    ctx.clearRect(0,0,W,H);
    const cx=W/2, cy=H/2, unit=Math.min(W,H);
    const sh=ctx.createLinearGradient(0,0,0,H);
    sh.addColorStop(0,'rgba(110,200,210,0.05)');sh.addColorStop(0.55,'rgba(40,90,120,0.02)');sh.addColorStop(1,'rgba(8,16,26,0)');
    ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);

    // 汽笛のとき、水平線の彼方にぼんやりした灯り（距離が近いほどわずかに濃い）
    if(hornGlow>0.008){
      const lx=W*hornX, ly=H*0.86;
      const gp=ctx.createRadialGradient(lx,ly,0,lx,ly,unit*0.13);
      gp.addColorStop(0,`rgba(210,230,240,${0.11*hornGlow})`);gp.addColorStop(1,'rgba(210,230,240,0)');
      ctx.fillStyle=gp; ctx.beginPath(); ctx.arc(lx,ly,unit*0.13,0,Math.PI*2); ctx.fill();
    }

    for(let i=bubbleVis.length-1;i>=0;i--){const bb=bubbleVis[i];bb.y-=bb.v*0.016;bb.x+=Math.sin(bb.y*0.02+bb.wob)*0.4;if(bb.y<-12){bubbleVis.splice(i,1);continue;}ctx.strokeStyle='rgba(180,225,235,0.22)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(bb.x,bb.y,bb.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(210,240,248,0.06)';ctx.beginPath();ctx.arc(bb.x-bb.r*0.3,bb.y-bb.r*0.3,bb.r*0.4,0,Math.PI*2);ctx.fill();}

    const accent=inhale?'127,214,200':'242,199,154';
    const baseR=unit*0.16, R=baseR*(0.62+0.42*b);
    const guideR=unit*0.30;
    ctx.strokeStyle='rgba(159,178,189,0.14)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,guideR,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(${accent},0.85)`;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.beginPath();ctx.arc(cx,cy,guideR,-Math.PI/2,-Math.PI/2+b*Math.PI*2);ctx.stroke();
    const ang=-Math.PI/2+b*Math.PI*2;ctx.fillStyle=`rgba(${accent},0.95)`;ctx.beginPath();ctx.arc(cx+Math.cos(ang)*guideR,cy+Math.sin(ang)*guideR,4.5,0,Math.PI*2);ctx.fill();

    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.7);
    grd.addColorStop(0,`rgba(${accent},0.28)`);grd.addColorStop(0.55,`rgba(${accent},0.10)`);grd.addColorStop(1,`rgba(${accent},0)`);
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,R*1.7,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(${accent},0.55)`;ctx.lineWidth=1.4;ctx.beginPath();
    const seg=72;for(let i=0;i<=seg;i++){const a=i/seg*Math.PI*2;const w=reduceMotion?0:Math.sin(a*3+now*1.2)*R*0.012+Math.sin(a*5-now*0.8)*R*0.008;const rr=R+w;const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.closePath();ctx.stroke();

    animId=requestAnimationFrame(draw);
  }

  function start(){
    if(!audio) initAudio();
    if(audio.state==='suspended') audio.resume();
    playing=true; toggleBtn.textContent='❚❚ とめる'; hintEl.style.opacity='0';
    startT=audio.currentTime+0.05; cycleIdx=0; nextCycleT=audio.currentTime+0.05; lastPhase=null;
    setWord('すう','inhale'); subEl.textContent='鼻から、ゆっくり';
    scheduler(); scheduleFoghorn(); if(!animId) draw();
  }
  function stop(){
    playing=false; toggleBtn.textContent='▶ はじめる'; clearTimeout(schedulerId); clearTimeout(foghornTimer);
    if(master){master.gain.linearRampToValueAtTime(0.0001,audio.currentTime+0.6);setTimeout(()=>{if(audio)audio.suspend();},700);}
  }
  toggleBtn.addEventListener('click',()=>{if(playing)stop();else{if(master)master.gain.value=volEl.value/100*0.85;start();}});
  volEl.addEventListener('input',()=>{if(master)master.gain.value=volEl.value/100*0.85;});

  resize(); draw();
})();
</script>
</body>
</html>
